<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suma y Multiplicación de Matrices</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Suma y Multiplicación de Matrices</h1>
        <p class="subtitle">Versión Local (Cliente)</p>

        <div class="input-section">
            <div class="form-group">
                <label for="rows">Cantidad de filas:</label>
                <input type="number" id="rows" min="1" max="10" value="2" required>
            </div>
            <div class="form-group">
                <label for="cols">Cantidad de columnas:</label>
                <input type="number" id="cols" min="1" max="10" value="2" required>
            </div>
            <button onclick="dibujarMatrices()">Dibujar Matrices</button>
        </div>

        <div id="matrixContainer" style="display: none;">
            <div class="matrices-section">
                <div class="matrix-input">
                    <h2>Matriz A</h2>
                    <div id="matrixA"></div>
                    <span id="errorA" class="error"></span>
                </div>

                <div class="matrix-input">
                    <h2>Matriz B</h2>
                    <div id="matrixB"></div>
                    <span id="errorB" class="error"></span>
                </div>
            </div>

            <div class="operations-section">
                <button onclick="sumaMatrices()" class="btn-operation">Suma (A + B)</button>
                <button onclick="multiplicaMatrices()" class="btn-operation">Multiplicación (A × B)</button>
            </div>

            <div id="resultSection" style="display: none;" class="result-section">
                <h2 id="resultTitle"></h2>
                <div id="resultMatrix" class="matrix-result"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
