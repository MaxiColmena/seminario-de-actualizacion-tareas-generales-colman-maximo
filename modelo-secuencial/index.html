<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TensorFlow.js - Regresión Lineal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div class="glass-card">
            <header class="header">
                <div class="logo-container">
                    <img src="https://www.gstatic.com/devrel-devsite/prod/v7b3726569f688846c4f0b2f83a48e715b9442f49557b447476839352e85a5a1e/tensorflow/images/favicon.png" alt="TensorFlow Logo" class="logo">
                    <h1>TensorFlow.js</h1>
                </div>
                <div class="equation-badge">
                    <i class="fas fa-chart-line"></i>
                    <span>y = 2x + 6</span>
                </div>
                <p class="subtitle">Regresión lineal secuencial</p>
            </header>

            <main class="content">
                <!-- Training Section -->
                <section class="card training-card">
                    <div class="card-header">
                        <i class="fas fa-dumbbell icon-purple"></i>
                        <h2>Entrenar Modelo</h2>
                    </div>
                    <div class="info-box" id="training-status">
                        <i class="fas fa-info-circle"></i>
                        <span>Modelo listo para cargar datos.</span>
                    </div>
                    <button id="train-btn" class="btn btn-purple">
                        <i class="fas fa-play"></i>
                        Empezar Entrenamiento
                    </button>
                </section>

                <!-- Prediction Section -->
                <section class="card prediction-card">
                    <div class="card-header">
                        <i class="fas fa-magic icon-yellow"></i>
                        <h2>Predecir valor</h2>
                        <span class="status-badge" id="model-status">No entrenado</span>
                    </div>
                    
                    <div class="input-group">
                        <input type="number" id="predict-input" placeholder="Ingresa un valor (x)" value="4">
                    </div>

                    <button id="predict-btn" class="btn btn-teal" disabled>
                        <i class="fas fa-pencil-alt"></i>
                        Predecir
                    </button>

                    <div class="result-container">
                        <p class="result-title">RESULTADO DE LA PREDICCIÓN</p>
                        <div id="prediction-output" class="prediction-value">---</div>
                        <p class="result-formula">y = peso * x + sesgo</p>
                    </div>
                </section>
            </main>

            <footer class="footer">
                <p><i class="fas fa-microchip"></i> Modelo secuencial Dense(1) | Entrenamiento con 500 épocas</p>
            </footer>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
